<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="bgBanner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#c084fc"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="url(#bgBanner)" rx="16"/>

  <!-- Subtle grid dots -->
  <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="15" cy="15" r="1" fill="white" opacity="0.06"/>
  </pattern>
  <rect width="800" height="200" fill="url(#dots)" rx="16"/>

  <!-- Icon background -->
  <rect x="40" y="60" width="80" height="80" rx="20" fill="url(#iconGrad)" opacity="0.9"/>

  <!-- Book -->
  <rect x="52" y="74" width="38" height="48" rx="3" fill="white" opacity="0.95"/>
  <rect x="52" y="74" width="6" height="48" rx="2" fill="white" opacity="0.5"/>
  <rect x="62" y="83" width="22" height="3" rx="1.5" fill="#6366f1" opacity="0.6"/>
  <rect x="62" y="91" width="18" height="3" rx="1.5" fill="#6366f1" opacity="0.4"/>
  <rect x="62" y="99" width="20" height="3" rx="1.5" fill="#6366f1" opacity="0.4"/>
  <rect x="62" y="107" width="15" height="3" rx="1.5" fill="#6366f1" opacity="0.3"/>

  <!-- Sparkle big -->
  <g transform="translate(104, 80)" filter="url(#glow)">
    <path d="M0,-12 L2.8,-2.8 L12,0 L2.8,2.8 L0,12 L-2.8,2.8 L-12,0 L-2.8,-2.8 Z" fill="white" opacity="0.95"/>
  </g>
  <!-- Sparkle small -->
  <g transform="translate(114, 104)">
    <path d="M0,-7 L1.6,-1.6 L7,0 L1.6,1.6 L0,7 L-1.6,1.6 L-7,0 L-1.6,-1.6 Z" fill="white" opacity="0.65"/>
  </g>

  <!-- Main title -->
  <text x="148" y="112" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="52" font-weight="800" fill="url(#textGrad)" filter="url(#glow)">SyllabusAI</text>

  <!-- Tagline -->
  <text x="150" y="140" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="400" fill="white" opacity="0.55">Умный органайзер силлабусов на базе ИИ</text>

  <!-- Badges row -->
  <rect x="150" y="155" width="80" height="24" rx="12" fill="#6366f1" opacity="0.3"/>
  <text x="190" y="171" font-family="sans-serif" font-size="11" font-weight="600" fill="#a5b4fc" text-anchor="middle">Next.js 16</text>

  <rect x="238" y="155" width="72" height="24" rx="12" fill="#a855f7" opacity="0.3"/>
  <text x="274" y="171" font-family="sans-serif" font-size="11" font-weight="600" fill="#d8b4fe" text-anchor="middle">Claude AI</text>

  <rect x="318" y="155" width="68" height="24" rx="12" fill="#0ea5e9" opacity="0.25"/>
  <text x="352" y="171" font-family="sans-serif" font-size="11" font-weight="600" fill="#7dd3fc" text-anchor="middle">SQLite</text>

  <rect x="394" y="155" width="78" height="24" rx="12" fill="#10b981" opacity="0.25"/>
  <text x="433" y="171" font-family="sans-serif" font-size="11" font-weight="600" fill="#6ee7b7" text-anchor="middle">TypeScript</text>
</svg>

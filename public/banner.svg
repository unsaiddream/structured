<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220" width="900" height="220">
  <defs>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6ee7fa"/>
      <stop offset="100%" style="stop-color:#4f8ef7"/>
    </linearGradient>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="220" rx="18" fill="#0d1117"/>

  <!-- Subtle grid -->
  <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M40 0 L0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.4" opacity="0.04"/>
  </pattern>
  <rect width="900" height="220" fill="url(#grid)" rx="18"/>

  <!-- ── Mini logo (left) ────────────────────────────── -->
  <!-- Bg square -->
  <rect x="44" y="60" width="100" height="100" rx="22" fill="#161b22"/>
  <rect x="44" y="60" width="100" height="100" rx="22" fill="none" stroke="#30363d" stroke-width="1"/>

  <!-- Vertical guide -->
  <rect x="60" y="74" width="3" height="72" rx="1.5" fill="url(#accentLine)" filter="url(#softglow)"/>
  <!-- Bars -->
  <rect x="68" y="74"  width="60" height="7" rx="2" fill="#ffffff"/>
  <rect x="68" y="89"  width="42" height="6" rx="2" fill="#ffffff" opacity="0.6"/>
  <rect x="68" y="102" width="28" height="6" rx="2" fill="#ffffff" opacity="0.38"/>
  <rect x="68" y="115" width="50" height="6" rx="2" fill="#ffffff" opacity="0.6"/>
  <rect x="68" y="128" width="56" height="7" rx="2" fill="#ffffff" opacity="0.82"/>
  <!-- Dot -->
  <circle cx="129" cy="143" r="3.5" fill="url(#accentLine)" filter="url(#softglow)"/>

  <!-- ── Wordmark ──────────────────────────────────── -->
  <text x="168" y="128"
    font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif"
    font-size="58" font-weight="800" letter-spacing="-2"
    fill="#ffffff">structured</text>

  <!-- Accent underline -->
  <rect x="168" y="139" width="340" height="3" rx="1.5" fill="url(#accentLine)" opacity="0.7"/>

  <!-- Tagline -->
  <text x="170" y="165"
    font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif"
    font-size="16" font-weight="400" letter-spacing="0.3"
    fill="#8b949e">AI-powered syllabus organizer</text>

  <!-- ── Right badges ──────────────────────────────── -->
  <!-- Next.js -->
  <rect x="660" y="72" width="90" height="26" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="705" y="89" font-family="monospace" font-size="11" font-weight="600" fill="#e6edf3" text-anchor="middle">Next.js 16</text>

  <!-- Claude AI -->
  <rect x="760" y="72" width="96" height="26" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="808" y="89" font-family="monospace" font-size="11" font-weight="600" fill="#6ee7fa" text-anchor="middle">Claude AI</text>

  <!-- TypeScript -->
  <rect x="660" y="106" width="90" height="26" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="705" y="123" font-family="monospace" font-size="11" font-weight="600" fill="#4f8ef7" text-anchor="middle">TypeScript</text>

  <!-- SQLite -->
  <rect x="760" y="106" width="96" height="26" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="808" y="123" font-family="monospace" font-size="11" font-weight="600" fill="#e6edf3" text-anchor="middle">SQLite</text>

  <!-- Tailwind -->
  <rect x="660" y="140" width="90" height="26" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="705" y="157" font-family="monospace" font-size="11" font-weight="600" fill="#38bdf8" text-anchor="middle">Tailwind 4</text>

  <!-- Prisma -->
  <rect x="760" y="140" width="96" height="26" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="808" y="157" font-family="monospace" font-size="11" font-weight="600" fill="#a8b2d8" text-anchor="middle">Prisma 7</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6ee7fa"/>
      <stop offset="100%" style="stop-color:#4f8ef7"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="40" fill="#0d1117"/>

  <!-- Vertical guide rail -->
  <rect x="44" y="46" width="4" height="108" rx="2" fill="url(#accent)" filter="url(#glow)"/>

  <!-- Row 1 — full width, bold -->
  <rect x="56" y="46" width="100" height="10" rx="3" fill="#ffffff"/>

  <!-- Row 2 — indent level 1 -->
  <rect x="56" y="66" width="72" height="8" rx="3" fill="#ffffff" opacity="0.65"/>

  <!-- Row 3 — indent level 2 (shorter) -->
  <rect x="56" y="82" width="48" height="8" rx="3" fill="#ffffff" opacity="0.4"/>

  <!-- Row 4 — indent level 1 -->
  <rect x="56" y="98" width="84" height="8" rx="3" fill="#ffffff" opacity="0.65"/>

  <!-- Row 5 — indent level 2 -->
  <rect x="56" y="114" width="56" height="8" rx="3" fill="#ffffff" opacity="0.4"/>

  <!-- Row 6 — full width, bold again -->
  <rect x="56" y="130" width="96" height="10" rx="3" fill="#ffffff" opacity="0.85"/>

  <!-- Bottom accent dot — punctuation -->
  <circle cx="162" cy="148" r="5" fill="url(#accent)" filter="url(#glow)"/>
</svg>

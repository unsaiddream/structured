<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#6366f1" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="200" height="200" rx="44" fill="url(#bg)" filter="url(#shadow)"/>
  <!-- Shine overlay -->
  <rect width="200" height="200" rx="44" fill="url(#shine)"/>

  <!-- Book body -->
  <rect x="42" y="52" width="82" height="100" rx="6" fill="white" opacity="0.95"/>
  <!-- Book spine -->
  <rect x="42" y="52" width="12" height="100" rx="4" fill="white" opacity="0.6"/>
  <!-- Book lines -->
  <rect x="62" y="72" width="48" height="5" rx="2.5" fill="#6366f1" opacity="0.5"/>
  <rect x="62" y="85" width="40" height="5" rx="2.5" fill="#6366f1" opacity="0.35"/>
  <rect x="62" y="98" width="44" height="5" rx="2.5" fill="#6366f1" opacity="0.35"/>
  <rect x="62" y="111" width="36" height="5" rx="2.5" fill="#6366f1" opacity="0.25"/>
  <rect x="62" y="124" width="42" height="5" rx="2.5" fill="#6366f1" opacity="0.25"/>

  <!-- AI Sparkle — big star -->
  <g transform="translate(118, 62)">
    <path d="M0,-18 L4,-4 L18,0 L4,4 L0,18 L-4,4 L-18,0 L-4,-4 Z" fill="white" opacity="0.95"/>
  </g>

  <!-- AI Sparkle — small star top right -->
  <g transform="translate(148, 44)">
    <path d="M0,-9 L2,-2 L9,0 L2,2 L0,9 L-2,2 L-9,0 L-2,-2 Z" fill="white" opacity="0.7"/>
  </g>

  <!-- AI Sparkle — tiny star -->
  <g transform="translate(138, 92)">
    <path d="M0,-6 L1.5,-1.5 L6,0 L1.5,1.5 L0,6 L-1.5,1.5 L-6,0 L-1.5,-1.5 Z" fill="white" opacity="0.55"/>
  </g>
</svg>
